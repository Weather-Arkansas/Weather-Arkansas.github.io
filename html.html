<!DOCTYPE html>
<html>
<head>
<title>Free AI Image Generator</title>
<style>
body { font-family: sans-serif; text-align: center; background: #121212; color: #fff; }
input, button { padding: 10px; margin: 10px; width: 300px; }
img { max-width: 80%; margin-top: 20px; border-radius: 10px; }
</style>
</head>
<body>

<h1>Free AI Image Generator</h1>

<input type="text" id="prompt" placeholder="Enter prompt..." />
<br>
<button id="generate">Generate Image</button>

<div id="result"></div>

<script>
const generateBtn = document.getElementById("generate");
const resultDiv = document.getElementById("result");

generateBtn.addEventListener("click", async () => {
    const prompt = document.getElementById("prompt").value;
    if (!prompt) return alert("Enter a prompt!");

    resultDiv.innerHTML = "Generating...";

    try {
        // Free Hugging Face model endpoint
        const response = await fetch("https://hf.space/embed/stabilityai/stable-diffusion/api/predict/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ data: [prompt] })
        });

        const data = await response.json();
        if (data && data.data && data.data[0]) {
            // The image comes as base64
            const imageBase64 = data.data[0].split(",")[1];
            const img = document.createElement("img");
            img.src = "data:image/png;base64," + imageBase64;
            resultDiv.innerHTML = "";
            resultDiv.appendChild(img);
        } else {
            resultDiv.innerHTML = "Error generating image";
        }

    } catch (err) {
        resultDiv.innerHTML = "Error: " + err;
    }
});
</script>

</body>
</html>
